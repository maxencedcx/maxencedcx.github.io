<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
    <filter id="a">
        <feTurbulence type="fractalNoise" baseFrequency="0.28" numOctaves="10" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
            <feFuncR type="linear" slope="0.3" intercept="0.35"/>
            <feFuncG type="linear" slope="0.3" intercept="0.35"/>
            <feFuncB type="linear" slope="0.3" intercept="0.35"/>
        </feComponentTransfer>
    </filter>
    <rect width="100%" height="100%" filter="url(#a)"/>
</svg>